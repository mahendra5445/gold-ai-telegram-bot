services:
  # Telegram-only bot: koi HTTP server nahi hai, isliye "worker" type.
  # (WhatsApp integration hata di gayi — us waqt "web" + /health
  #  healthcheck chahiye tha, ab nahi.)
  - type: worker
    name: gold-ai-telegram-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
